services:
  - type: web
    name: encircle-companycam-sync
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ENCIRCLE_TOKEN
        sync: false
      - key: COMPANYCAM_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: COMPANYCAM_PROJECT_LABEL
        value: Bloque Project From Encircle
